services:

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  ai-service:
    build: ./ai-service
    ports:
      - "8001:8001"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - ai-service
      - redis
    command: daphne -b 0.0.0.0 -p 8000 core.asgi:application

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend