version: "3.9"

services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    restart: always

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: always
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- NEW AUTH SERVICE ---
  # --- NEW AUTH SERVICE ---
  auth-service:
    build: ./auth-service
    ports:
      - "8002:8002"
    environment:
      - GOOGLE_CLIENT_ID=491409934255-t4340hqkqos46hld52eftq9v7m0egp89.apps.googleusercontent.com
      - GOOGLE_CLIENT_SECRET=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
    volumes:
      - ./auth-service:/app      # Add this so your code updates without rebuilding!
      - ./backend:/db_sharing:rw 
    restart: always

  ai-service:
    build: ./ai-service
    ports:
      - "8001:8001"
    restart: always

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started
      ai-service:
        condition: service_started
    command: daphne -b 0.0.0.0 -p 8000 core.asgi:application
    restart: always

  celery:
    build: ./backend
    command: sh -c "sleep 10 && celery -A core worker -l info"
    volumes:
      - ./backend:/app
    depends_on:
      rabbitmq:
        condition: service_healthy
      backend:
        condition: service_started
    restart: always

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules     # Keeps your local node_modules from conflicting
    depends_on:
      - backend
      - auth-service
    restart: always